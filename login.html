<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Kasir</title>
    <style>
        body { margin: 0; font-family: sans-serif; height: 100vh; background: linear-gradient(135deg, #1e3c72, #2a5298); display: flex; justify-content: center; align-items: center; }
        .login-box { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; width: 300px; text-align: center; color: white; border: 1px solid rgba(255,255,255,0.2); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00c853; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>LOGIN KASIR</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login Sekarang</button>
        <p id="error" style="color: #ff5252;"></p>
    </div>

    <script>
        async function login() {
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;
            try {
                const response = await fetch('http://localhost:3000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const result = await response.json();
                if (result.success) {
                    localStorage.setItem("token", result.token); //
                    alert("Login Berhasil!");
                    window.location.href = "index.html"; // Ini akan buka file index.html
                } else {
                    document.getElementById("error").innerText = result.message;
                }
            } catch (err) { alert("Server mati!"); }
        }
    </script>
</body>
</html>
